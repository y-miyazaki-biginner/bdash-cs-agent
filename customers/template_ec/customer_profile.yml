company:
  name: テンプレEC企業
  industry: エンタメ
  site_type: ECサイト（CD・DVD・グッズ等）
  channels:
  - メール
data_rules:
  cart_detection:
    pattern: cart_add_click
    cart_page_url_pattern: ''
    cart_add_element_class: add-to-cart-btn
    note: カート投入してもカートページに遷移しないサイトのため②を採用
relation_mapping:
  リレーション項目_1:
    content: 顧客ID
    fk: customers.customer_id
  リレーション項目_2:
    content: 受注ID
    fk: orders.order_id
  リレーション項目_7:
    content: 商品ID
    fk: products.product_id
  リレーション項目_10:
    content: ''
    fk: ''
global_exclusions:
- id: 1
  condition: メルマガ未許諾
  table: customers
  column: mail_permission
  logic: = FALSE のユーザーを除外
operational_rules:
- メール配信可能時間帯は10:00〜19:00
- 時間外の配信は翌日10:00に繰り越し
past_campaigns:
- - campaign: 全般
    feedback: テーブル構造やカラム名について不明な場合は、ユーザーに質問する前にまずデータ定義ファイル（data_definition.yml）を確認すること。データ定義に存在しないテーブル・カラムについてのみユーザーに確認する。
    date: 2025-01-01
    action: 運用ルールとして適用
- - campaign: カート投入関連施策
    feedback: カート投入施策はユーザーから特別な指定がない限り、デフォルトでIDマッピングデータと連携して未ログインユーザーも配信対象に含め、配信母数を最大化すること。ログイン済みユーザーのみに限定する場合は、ユーザーから明示的な指示があった場合のみとする。
    date: 2025-01-27
    action: カート投入施策の標準運用ルールとして適用
implementation_feedback:
- - campaign: 関連商品レコメンドメール
    feedback: '【重要】関連商品分析の正しいロジック実装方法：


      ■ b→dashでの自己結合による商品ペア分析手順

      1. 商品閲覧データ同士をセッションIDで横統合（全データ）

      2. IF文でproduct_id = product_idなら"1"、それ以外なら空白

      3. 空白のみ絞り込み（異なる商品ペアのみ抽出）

      4. product_id, product_idでグループ集約してwebアクセスログIDをカウント

      5. product_idでグループ別ランキング（カウント数降順）


      ■ 配信データ作成の正しい手順

      1. webアクセスログ + 顧客データ統合 → 顧客別最終閲覧商品データ作成

      2. 関連商品ランキングデータ + productデータ横統合 → 商品情報付きランキング

      3. 行結合でproduct_idキー、ランキング順結合

      4. 上記2データを横統合して最終配信データ作成


      ■ b→dash制約事項

      - 異なるファイルのカラム同士の比較条件（ファイル1.product_id ≠ ファイル2.product_id）は絞り込み条件で直接指定不可

      - IF文による条件分岐後の絞り込みが必要

      - 基本データ統合（customers統合）は不要で直接商品閲覧データから開始

      '
    date: 2025-01-27
    action: b→dash制約を考慮した実装手順として記録
- - campaign: カート投入後未購入者リマインダーメール
    feedback: "【重要】購入後カート投入者の取り扱いに関する判定ルール：\n\n■ 確認すべき3つのケース\n1. 同一セッション内での購入後カート投入\
      \ → 通常は配信対象外\n2. 過去購入歴のあるユーザーの新規カート投入 → 配信対象にするケースが多い  \n3. カート投入商品自体の再購入 →\
      \ 企業方針による\n\n■ 今回の判定ルール（標準パターン）\n- 過去購入歴に関係なく、別商品の新規カート投入は配信対象\n- 同一セッション内購入後のカート投入のみ除外\n\
      - セグメント作成時は同一セッション内の購入完了チェックのみ実装\n\n■ 実装上の注意点\n- セグメント条件：セッションID内でcomplete画面PV有無をチェック\n\
      - 差込商品からの購入済み商品除外は別途実装が必要\n- 顧客別購入履歴との突合は過去購入歴を考慮する場合のみ必要\n\n今後のカート投入施策では、この判定ルールを標準として提案すること。\n"
    date: 2025-01-27
    action: カート投入施策の購入後判定ルールとして記録
